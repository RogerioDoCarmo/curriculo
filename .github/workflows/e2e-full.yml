name: E2E Full Browser Matrix

on:
  push:
    branches:
      - main
      - develop
  schedule:
    # Run full E2E suite daily at 2 AM UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    # Allow manual trigger

permissions:
  contents: read
  issues: write

jobs:
  e2e-full:
    name: E2E Tests (All Browsers)
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit, mobile-chrome, mobile-safari]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser == 'mobile-chrome' &&
          'chromium' || matrix.browser == 'mobile-safari' && 'webkit' ||
          matrix.browser }}

      - name: Run E2E tests for ${{ matrix.browser }}
        run: npx playwright test --project=${{ matrix.browser }}

      - name: Upload test results for ${{ matrix.browser }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/

      - name: Upload test videos for ${{ matrix.browser }}
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos-${{ matrix.browser }}
          path: test-results/

  report-status:
    name: Report E2E Status
    runs-on: ubuntu-latest
    needs: e2e-full
    if: always()

    steps:
      - name: Check E2E results
        run: |
          if [[ "${{ needs.e2e-full.result }}" != "success" ]]; then
            echo "❌ E2E tests failed on one or more browsers"
            exit 1
          fi
          echo "✅ All E2E tests passed across all browsers"
