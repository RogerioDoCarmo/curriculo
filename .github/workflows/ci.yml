name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test --
          --testPathIgnorePatterns="lighthouse|ExitIntentModal-resume|lazy-components|TechStackSection.test|tech-stack-links|resume-download|responsive-layout"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: coverage/

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage -- --testPathIgnorePatterns="lighthouse|ExitIntentModal-resume|lazy-components|TechStackSection.test|tech-stack-links|resume-download|responsive-layout"

      - name: Check coverage threshold
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "❌ Coverage summary file not found"
            exit 1
          fi

          # Extract coverage percentage using Node.js (more portable than jq)
          COVERAGE=$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8')); console.log(data.total.lines.pct);")
          echo "Line Coverage: $COVERAGE%"

          # Check if coverage meets threshold (using awk for floating point comparison)
          if awk "BEGIN {exit !($COVERAGE < 71)}"; then
            echo "❌ Coverage ($COVERAGE%) is below 71% threshold"
            exit 1
          fi
          echo "✅ Coverage meets 71% threshold (goal: 90%)"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const total = coverage.total;

            const comment = `## 📊 Test Coverage Report

            | Metric | Coverage | Status |
            |--------|----------|--------|
            | Lines | ${total.lines.pct}% | ${total.lines.pct >= 71 ? '✅' : '❌'} |
            | Statements | ${total.statements.pct}% | ${total.statements.pct >= 71 ? '✅' : '❌'} |
            | Functions | ${total.functions.pct}% | ${total.functions.pct >= 71 ? '✅' : '❌'} |
            | Branches | ${total.branches.pct}% | ${total.branches.pct >= 65 ? '✅' : '❌'} |

            **Current Threshold**: 71% minimum (Goal: 90%)
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: out/

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium ${{ github.event_name !=
          'pull_request' && 'firefox webkit' || '' }}

      - name: Run E2E tests
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: npm run test:e2e

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload E2E test videos
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-videos
          path: test-results/

  lighthouse:
    name: Lighthouse Performance Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      - name: Start server in background
        run: |
          npm run serve &
          echo $! > server.pid
          sleep 5

      - name: Wait for server to be ready
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:3000; do sleep 1; done'

      - name: Run Lighthouse tests
        run: npm run test:lighthouse

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill $(cat server.pid) || true
          fi

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-results
          path: lighthouse-report.json

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [ test, coverage ]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage -- --testPathIgnorePatterns="lighthouse|ExitIntentModal-resume|lazy-components|TechStackSection.test|tech-stack-links|resume-download|responsive-layout"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  status-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [ lint, type-check, test, coverage, build, e2e, lighthouse, sonarqube ]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          # Check required jobs (must be success)
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.type-check.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.coverage.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.e2e.result }}" != "success" ]] || \
             [[ "${{ needs.lighthouse.result }}" != "success" ]]; then
            echo "❌ One or more required checks failed"
            exit 1
          fi

          # Check SonarQube (can be success or skipped)
          if [[ "${{ needs.sonarqube.result }}" != "success" ]] && \
             [[ "${{ needs.sonarqube.result }}" != "skipped" ]]; then
            echo "❌ SonarQube check failed"
            exit 1
          fi

          echo "✅ All checks passed"
