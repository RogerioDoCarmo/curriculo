name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - develop
      - main

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        run: npm run lint

  type-check:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run TypeScript type check
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm test --
          --testPathIgnorePatterns="lighthouse|ExitIntentModal-resume|lazy-components|TechStackSection.test|tech-stack-links|resume-download|responsive-layout"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: coverage/

  coverage:
    name: Test Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage --
          --testPathIgnorePatterns="lighthouse|ExitIntentModal-resume|lazy-components|TechStackSection.test|tech-stack-links|resume-download|responsive-layout"

      - name: Check coverage threshold
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "❌ Coverage summary file not found"
            exit 1
          fi

          # Extract coverage percentage using Node.js (more portable than jq)
          COVERAGE=$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8')); console.log(data.total.lines.pct);")
          echo "Line Coverage: $COVERAGE%"

          # Check if coverage meets threshold (using awk for floating point comparison)
          if awk "BEGIN {exit !($COVERAGE < 71)}"; then
            echo "❌ Coverage ($COVERAGE%) is below 71% threshold"
            exit 1
          fi
          echo "✅ Coverage meets 71% threshold (goal: 90%)"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v6
        with:
          name: coverage-report
          path: coverage/

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
            const total = coverage.total;

            const comment = `## 📊 Test Coverage Report

            | Metric | Coverage | Status |
            |--------|----------|--------|
            | Lines | ${total.lines.pct}% | ${total.lines.pct >= 71 ? '✅' : '❌'} |
            | Statements | ${total.statements.pct}% | ${total.statements.pct >= 71 ? '✅' : '❌'} |
            | Functions | ${total.functions.pct}% | ${total.functions.pct >= 71 ? '✅' : '❌'} |
            | Branches | ${total.branches.pct}% | ${total.branches.pct >= 65 ? '✅' : '❌'} |

            **Current Threshold**: 71% minimum (Goal: 90%)
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: build-output
          path: out/

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium ${{ github.event_name !=
          'pull_request' && 'firefox webkit' || '' }}

      - name: Run E2E tests
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: npm run test:e2e

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/

      - name: Upload E2E test videos
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-videos
          path: test-results/

  lighthouse:
    name: Lighthouse Performance Tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      # Port Conflict Resolution Phase
      # Expected: Port 3000 is available for server startup
      # Failure: Port is already in use by previous CI jobs or concurrent processes
      - name: Resolve port conflicts
        run: |
          echo "Checking for port conflicts on port 3000..."

          # Check if port 3000 is in use
          if lsof -Pi :3000 -sTCP:LISTEN -t >/dev/null 2>&1 ; then
            echo "⚠️  WARNING: Port 3000 is already in use"
            echo "Attempting to kill existing processes on port 3000..."
            
            # Kill all processes using port 3000
            lsof -ti:3000 | xargs kill -9 2>/dev/null || true
            
            # Wait a moment for processes to terminate
            sleep 2
            
            # Verify port is now available
            if lsof -Pi :3000 -sTCP:LISTEN -t >/dev/null 2>&1 ; then
              echo "❌ ERROR: Failed to free port 3000"
              echo "Port 3000 is still in use after cleanup attempt"
              lsof -i :3000
              exit 1
            fi
            
            echo "✓ Port 3000 is now available"
          else
            echo "✓ Port 3000 is available (no conflicts detected)"
          fi

      # Server Startup Phase
      # Expected: Server starts successfully and logs output to server.log
      # Failure: PID file not created or process crashes immediately
      - name: Start server in background
        run: |
          echo "Starting Next.js production server on port 3000..."
          npm run serve > server.log 2>&1 &
          echo $! > server.pid
          echo "Server started with PID: $(cat server.pid)"
          echo "Server output is being logged to server.log"
          sleep 2

      # Process Validation Phase
      # Expected: Server process is running and hasn't crashed
      # Failure: Process not found or exited immediately (port conflict, missing files, etc.)
      - name: Validate server process
        run: |
          echo "Validating server process is running..."
          if [ ! -f server.pid ]; then
            echo "❌ ERROR: PID file (server.pid) was not created"
            echo "This indicates the server failed to start. Check the 'Start server in background' step output."
            exit 1
          fi

          PID=$(cat server.pid)
          if ! ps -p $PID > /dev/null 2>&1; then
            echo "❌ ERROR: Server process (PID $PID) is not running"
            echo "The server process started but crashed immediately after startup."
            echo "Common causes: port 3000 already in use, missing dependencies, configuration errors"
            if [ -f server.log ]; then
              echo ""
              echo "=== Server Log (last 50 lines) ==="
              tail -n 50 server.log
              echo "=== End Server Log ==="
            fi
            exit 1
          fi

          echo "✓ Server process is running (PID $PID)"
          echo "Waiting 13 seconds for server initialization..."
          sleep 13

      # Readiness Check Phase
      # Expected: Server responds with HTTP 200-299 within 60 seconds (30 attempts × 2s)
      # Failure: Server not responding, wrong port, or returning error status codes
      - name: Wait for server to be ready
        run: |
          echo "Checking server readiness at http://localhost:3000..."
          MAX_ATTEMPTS=30
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            HTTP_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" http://localhost:3000 2>/dev/null || echo "000")
            
            if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "✓ Server is ready! (HTTP $HTTP_CODE)"
              exit 0
            fi
            
            ATTEMPT=$((ATTEMPT + 1))
            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS: Server not ready (HTTP $HTTP_CODE), retrying in 2s..."
            sleep 2
          done

          echo "❌ ERROR: Server failed to become ready after $MAX_ATTEMPTS attempts (60 seconds)"
          echo "Last HTTP status code: $HTTP_CODE"
          echo ""
          echo "Troubleshooting steps:"
          echo "  1. Check if the server is binding to the correct port (3000)"
          echo "  2. Verify the build artifacts in out/ directory are valid"
          echo "  3. Check server.log below for startup errors or warnings"
          echo ""
          if [ -f server.log ]; then
            echo "=== Server Log (last 50 lines) ==="
            tail -n 50 server.log
            echo "=== End Server Log ==="
          fi
          exit 1

      # Final Verification Phase
      # Expected: Server responds with successful HTTP status code
      # Failure: Server stopped responding between readiness check and this verification
      - name: Verify server is running
        run: |
          echo "Performing final server verification..."
          HTTP_CODE=$(curl -f -s -o /dev/null -w "%{http_code}" http://localhost:3000)
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✓ Server verification successful (HTTP $HTTP_CODE)"
            echo "Server is ready for Lighthouse tests"
          else
            echo "❌ ERROR: Server not responding with valid status code (HTTP $HTTP_CODE)"
            echo "Expected: 200-299, Got: $HTTP_CODE"
            echo "The server was ready but is now returning an error status code."
            exit 1
          fi

      # Test Execution Phase
      # Expected: Lighthouse tests run successfully against the server
      # Failure: Tests fail due to performance issues or server problems
      - name: Run Lighthouse tests
        run: npm run test:lighthouse

      # Diagnostic Phase (runs only on failure)
      # Displays server logs to help diagnose any failures in previous steps
      - name: Display server logs on failure
        if: failure()
        run: |
          echo "=== Diagnostic Information ==="
          echo "Job failed. Displaying server logs for debugging..."
          echo ""
          if [ -f server.log ]; then
            echo "=== Full Server Log ==="
            cat server.log
            echo "=== End Server Log ==="
          else
            echo "⚠️  WARNING: server.log file not found"
            echo "The server may not have started at all."
          fi
          echo ""
          if [ -f server.pid ]; then
            PID=$(cat server.pid)
            echo "Server PID: $PID"
            if ps -p $PID > /dev/null 2>&1; then
              echo "Server process status: RUNNING"
            else
              echo "Server process status: NOT RUNNING (crashed or stopped)"
            fi
          else
            echo "⚠️  WARNING: server.pid file not found"
          fi

      # Cleanup Phase
      # Expected: Server process is terminated gracefully
      # Always runs regardless of success/failure
      - name: Stop server
        if: always()
        run: |
          echo "Stopping server..."
          if [ -f server.pid ]; then
            PID=$(cat server.pid)
            if ps -p $PID > /dev/null 2>&1; then
              echo "Attempting graceful shutdown with SIGTERM..."
              kill $PID || true
              
              # Wait up to 5 seconds for graceful shutdown
              for i in {1..5}; do
                if ! ps -p $PID > /dev/null 2>&1; then
                  echo "✓ Server process (PID $PID) stopped gracefully"
                  break
                fi
                sleep 1
              done
              
              # If process still exists, force kill with SIGKILL
              if ps -p $PID > /dev/null 2>&1; then
                echo "⚠️  Graceful shutdown failed, forcing termination with SIGKILL..."
                kill -9 $PID || true
                sleep 1
                
                if ps -p $PID > /dev/null 2>&1; then
                  echo "❌ ERROR: Failed to terminate server process (PID $PID)"
                else
                  echo "✓ Server process (PID $PID) force terminated"
                fi
              fi
            else
              echo "Server process (PID $PID) was already stopped"
            fi
            
            # Clean up PID file
            rm -f server.pid
            echo "✓ Cleaned up PID file"
          else
            echo "⚠️  No PID file found, server may not have started"
          fi

          # Clean up log file
          if [ -f server.log ]; then
            rm -f server.log
            echo "✓ Cleaned up log file"
          fi

          # Final verification: ensure no processes are left on port 3000
          if lsof -Pi :3000 -sTCP:LISTEN -t >/dev/null 2>&1 ; then
            echo "⚠️  WARNING: Processes still running on port 3000 after cleanup"
            echo "Killing remaining processes..."
            lsof -ti:3000 | xargs kill -9 2>/dev/null || true
            sleep 1
            
            if lsof -Pi :3000 -sTCP:LISTEN -t >/dev/null 2>&1 ; then
              echo "❌ ERROR: Failed to clean up port 3000"
              lsof -i :3000
            else
              echo "✓ Port 3000 cleaned up successfully"
            fi
          else
            echo "✓ Port 3000 is clean (no processes running)"
          fi

      # Artifact Upload Phase
      # Expected: Lighthouse results are uploaded for analysis
      # Always runs regardless of success/failure
      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lighthouse-results
          path: lighthouse-report.json

  sonarqube:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [ test, coverage ]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for better analysis

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build project
        run: npm run build

      - name: Run tests with coverage
        run: npm run test:coverage --
          --testPathIgnorePatterns="lighthouse|ExitIntentModal-resume|lazy-components|TechStackSection.test|tech-stack-links|resume-download|responsive-layout"

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  status-check:
    name: All Checks Passed
    runs-on: ubuntu-latest
    needs: [ lint, type-check, test, coverage, build, e2e, lighthouse, sonarqube ]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          # Check required jobs (must be success)
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.type-check.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.coverage.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.e2e.result }}" != "success" ]] || \
             [[ "${{ needs.lighthouse.result }}" != "success" ]]; then
            echo "❌ One or more required checks failed"
            exit 1
          fi

          # Check SonarQube (can be success or skipped)
          if [[ "${{ needs.sonarqube.result }}" != "success" ]] && \
             [[ "${{ needs.sonarqube.result }}" != "skipped" ]]; then
            echo "❌ SonarQube check failed"
            exit 1
          fi

          echo "✅ All checks passed"
