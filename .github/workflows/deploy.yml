name: Deploy to Production

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Check coverage threshold
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "❌ Coverage summary file not found"
            exit 1
          fi

          COVERAGE=$(node -e "const fs = require('fs'); const data = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8')); console.log(data.total.lines.pct);")
          echo "Line Coverage: $COVERAGE%"

          if awk "BEGIN {exit !($COVERAGE < 71)}"; then
            echo "❌ Coverage ($COVERAGE%) is below 71% threshold"
            exit 1
          fi
          echo "✅ Coverage meets 71% threshold (goal: 90%)"

  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: test
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        id: deploy
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

      - name: Send deployment notification
        if: success()
        run: |
          echo "Deployment successful to ${{ steps.deploy.outputs.url }}"
          # TODO: Implement Firebase Admin SDK push notification
          # This requires setting up a Node.js script with Firebase Admin SDK
          # to send FCM notifications to subscribed users

  notify:
    name: Send Push Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Send FCM notification
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          # Create notification script
          cat > send-notification.js << 'EOF'
          const admin = require('firebase-admin');

          // Initialize Firebase Admin SDK
          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });

          // Send notification to topic
          const message = {
            notification: {
              title: '🚀 Website Updated!',
              body: 'The personal resume website has been successfully deployed with new updates.'
            },
            topic: 'deployments'
          };

          admin.messaging().send(message)
            .then((response) => {
              console.log('✅ Notification sent successfully:', response);
              process.exit(0);
            })
            .catch((error) => {
              console.error('❌ Error sending notification:', error);
              process.exit(1);
            });
          EOF

          # Run the notification script
          node send-notification.js
